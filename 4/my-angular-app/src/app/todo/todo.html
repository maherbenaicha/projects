<section class="todo-wrapper">
  <h2>Todo App</h2>

  <div class="todo-form">
    <input
      [(ngModel)]="task"
      (keyup.enter)="addTask()"
      placeholder="Nouvelle tache"
    >
    <button (click)="addTask()">Ajouter</button>
  </div>

  <ul>
    <li *ngFor="let t of tasks; let i = index" [class.done]="t.done">
      <span (click)="toggleDone(t)">{{ t.text }}</span>
      <button (click)="deleteTask(i)">Supprimer</button>
    </li>
  </ul>
</section>
